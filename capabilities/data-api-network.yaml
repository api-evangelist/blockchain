naftiko: 1.0.0-alpha2
info:
  label: Blockchain.com Blockchain Data API — Network
  description: |
    Blockchain.com Blockchain Data API — Network. 13 operations. Lead operation: Blockchain.com Get Current Difficulty. Self-contained Naftiko capability covering one Blockchain.com business surface.
  tags:
    - Blockchain.com
    - Blockchain Data API
    - Network
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
    - type: http
      namespace: data-api-network
      baseUri: https://blockchain.info
      description: Blockchain.com Blockchain Data API — Network business capability. Self-contained, no shared references.
      resources:
        - name: q-getdifficulty
          path: /q/getdifficulty
          operations:
            - name: getDifficulty
              method: GET
              description: Blockchain.com Get Current Difficulty
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-getblockcount
          path: /q/getblockcount
          operations:
            - name: getBlockCount
              method: GET
              description: Blockchain.com Get Current Block Count
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-latesthash
          path: /q/latesthash
          operations:
            - name: getLatestHash
              method: GET
              description: Blockchain.com Get the Latest Block Hash
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-bcperblock
          path: /q/bcperblock
          operations:
            - name: getBcPerBlock
              method: GET
              description: Blockchain.com Get the Current Block Reward
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-totalbc
          path: /q/totalbc
          operations:
            - name: getTotalBc
              method: GET
              description: Blockchain.com Get Total Bitcoins in Circulation
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-probability
          path: /q/probability
          operations:
            - name: getProbability
              method: GET
              description: Blockchain.com Get Block Solve Probability
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-hashestowin
          path: /q/hashestowin
          operations:
            - name: getHashesToWin
              method: GET
              description: Blockchain.com Get Hashes Needed to Solve a Block
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-nextretarget
          path: /q/nextretarget
          operations:
            - name: getNextRetarget
              method: GET
              description: Blockchain.com Get Next Difficulty Retarget Block
              inputParameters: []
              outputRawFormat: json
              outputParameters:
