                  type: object
                  value: $.
        - name: q-avgtxsize
          path: /q/avgtxsize
          operations:
            - name: getAverageTxSize
              method: GET
              description: Blockchain.com Get Average Transaction Size
              inputParameters:
                - name: blocks
                  in: query
                  type: integer
                  required: false
                  description: Number of trailing blocks to average over.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-avgtxvalue
          path: /q/avgtxvalue
          operations:
            - name: getAverageTxValue
              method: GET
              description: Blockchain.com Get Average Transaction Value
              inputParameters:
                - name: blocks
                  in: query
                  type: integer
                  required: false
                  description: Number of trailing blocks to average over (default 1000).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: q-interval
          path: /q/interval
          operations:
