naftiko: 1.0.0-alpha2
info:
  label: Blockchain.com Blockchain Data API — Transactions
  description: |
    Blockchain.com Blockchain Data API — Transactions. 1 operations. Lead operation: Blockchain.com Get a Single Transaction. Self-contained Naftiko capability covering one Blockchain.com business surface.
  tags:
    - Blockchain.com
    - Blockchain Data API
    - Transactions
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
    - type: http
      namespace: data-api-transactions
      baseUri: https://blockchain.info
      description: Blockchain.com Blockchain Data API — Transactions business capability. Self-contained, no shared references.
      resources:
        - name: rawtx-tx-hash
          path: /rawtx/{tx_hash}
          operations:
            - name: getTransaction
              method: GET
              description: Blockchain.com Get a Single Transaction
              inputParameters:
                - name: tx_hash
                  in: path
                  type: string
                  required: true
                  description: Bitcoin transaction hash (64-character hex).
                - name: format
                  in: query
                  type: string
                  required: false
                  description: If set to `hex`, returns the raw transaction as a binary hex string.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: data-api-transactions-rest
      port: 8080
      description: REST adapter for Blockchain.com Blockchain Data API — Transactions. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/rawtx/{tx_hash}
          name: rawtx-tx-hash
          description: REST surface for rawtx-tx-hash.
          operations:
            - method: GET
              name: getTransaction
              description: Blockchain.com Get a Single Transaction
              call: data-api-transactions.getTransaction
              with:
                tx_hash: rest.tx_hash
                format: rest.format
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: data-api-transactions-mcp
      port: 9090
      transport: http
      description: MCP adapter for Blockchain.com Blockchain Data API — Transactions. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: get-single-transaction
          description: Blockchain.com Get a Single Transaction
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: data-api-transactions.getTransaction
          with:
            tx_hash: tools.tx_hash
            format: tools.format
          outputParameters:
            - type: object
              mapping: $.
