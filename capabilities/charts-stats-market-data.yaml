naftiko: 1.0.0-alpha2
info:
  label: Blockchain.com Charts, Stats & Market Data API — Market Data
  description: |
    Blockchain.com Charts, Stats & Market Data API — Market Data. 2 operations. Lead operation: Blockchain.com Get Exchange-rate Ticker. Self-contained Naftiko capability covering one Blockchain.com business surface.
  tags:
    - Blockchain.com
    - Charts, Stats & Market Data API
    - Market Data
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
    - type: http
      namespace: charts-stats-market-data
      baseUri: https://api.blockchain.info
      description: Blockchain.com Charts, Stats & Market Data API — Market Data business capability. Self-contained, no shared references.
      resources:
        - name: ticker
          path: /ticker
          operations:
            - name: getTicker
              method: GET
              description: Blockchain.com Get Exchange-rate Ticker
              inputParameters:
                - name: cors
                  in: query
                  type: boolean
                  required: false
                  description: If true, the response will include CORS headers.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: tobtc
          path: /tobtc
          operations:
            - name: convertToBtc
              method: GET
              description: Blockchain.com Convert Fiat to BTC
              inputParameters:
                - name: currency
                  in: query
                  type: string
                  required: true
                  description: ISO currency code (e.g. `USD`, `EUR`, `GBP`).
                - name: value
                  in: query
                  type: number
                  required: true
                  description: Amount of fiat to convert.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: charts-stats-market-data-rest
      port: 8080
      description: REST adapter for Blockchain.com Charts, Stats & Market Data API — Market Data. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/ticker
          name: ticker
          description: REST surface for ticker.
          operations:
            - method: GET
              name: getTicker
              description: Blockchain.com Get Exchange-rate Ticker
              call: charts-stats-market-data.getTicker
              with:
                cors: rest.cors
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/tobtc
          name: tobtc
          description: REST surface for tobtc.
          operations:
            - method: GET
              name: convertToBtc
              description: Blockchain.com Convert Fiat to BTC
              call: charts-stats-market-data.convertToBtc
              with:
                currency: rest.currency
                value: rest.value
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: charts-stats-market-data-mcp
      port: 9090
      transport: http
      description: MCP adapter for Blockchain.com Charts, Stats & Market Data API — Market Data. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: get-exchange-rate-ticker
          description: Blockchain.com Get Exchange-rate Ticker
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: charts-stats-market-data.getTicker
          with:
            cors: tools.cors
          outputParameters:
            - type: object
              mapping: $.
        - name: convert-fiat-btc
          description: Blockchain.com Convert Fiat to BTC
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: charts-stats-market-data.convertToBtc
          with:
            currency: tools.currency
            value: tools.value
          outputParameters:
            - type: object
              mapping: $.
