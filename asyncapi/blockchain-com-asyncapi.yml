                msgType: 8
                lastPx: 0.0
                lastShares: 0.0
                tradeId: "0"
                price: 15000.0

    ExchangeExecutionReport:
      name: ExchangeExecutionReport
      title: Execution report (order update)
      payload:
        allOf:
          - type: object
            required: [seqnum, event, channel]
            properties:
              seqnum: { type: integer }
              event:
                type: string
                const: updated
              channel:
                type: string
                const: trading
          - $ref: '#/components/schemas/ExchangeOrder'
      examples:
        - payload:
            seqnum: 5
