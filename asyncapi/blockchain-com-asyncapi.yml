    ExchangeTradingRejected:
      name: ExchangeTradingRejected
      title: Trading action rejected
      payload:
        type: object
        required: [seqnum, event, channel]
        properties:
          seqnum: { type: integer }
          event:
            type: string
            const: rejected
          channel:
            type: string
            const: trading
          text: { type: string }
          clOrdID: { type: string }
          ordStatus:
            type: string
            const: rejected
          action: { type: string }
      examples:
        - payload:
            seqnum: 5
            event: rejected
            channel: trading
            text: Invalid price
            clOrdID: Client ID 3
            ordStatus: rejected
            action: NewOrderSingle

  schemas:

    ExchangeOrder:
      type: object
      description: |
        Order / execution-report payload using FIX 4.2 field names. Returned in trading channel
        snapshots and updates.
      properties:
        orderID:
          type: string
          description: "FIX 37 — unique order id assigned by the exchange."
        clOrdID:
          type: string
          description: "FIX 11 — client-supplied order reference."
        symbol:
          type: string
          description: "FIX 55"
        side:
          type: string
          enum: [buy, sell]
          description: "FIX 54"
        ordType:
          type: string
          enum: [market, limit, stop, stopLimit]
          description: "FIX 40"
        orderQty:
          type: number
          description: "FIX 38"
        leavesQty:
          type: number
          description: "FIX 151 — remaining quantity open for execution."
        cumQty:
          type: number
          description: "FIX 14 — filled quantity so far."
        avgPx:
          type: number
          description: "FIX 6 — volume-weighted average price of fills."
        ordStatus:
          type: string
          enum: [pending, open, rejected, cancelled, filled, partial, expired]
          description: "FIX 39"
        timeInForce:
          type: string
          enum: [GTC, GTD, IOC, FOK]
          description: "FIX 59"
        text:
          type: string
          description: Free-form server status text.
        execType:
          type: string
          description: |
            FIX 150 — "0" New, "4" Canceled, "8" Rejected, "C" Expired, "F" Partial fill,
            "A" Pending, "H" Trade Break, "I" Order Status.
        execID:
          type: string
          description: "FIX 17 — unique id for this execution."
        transactTime:
          type: string
          description: "FIX 60"
        msgType:
          oneOf:
            - { type: string }
            - { type: integer }
          description: "FIX 35 — \"8\" ExecutionReport, \"9\" OrderCancelRejected."
        lastPx:
          type: number
          description: "FIX 31 — price of last fill."
        lastShares:
          type: number
          description: "FIX 32 — quantity of last fill."
        tradeId:
          type: string
          description: "FIX 1003/1004 — id of the trade / fill."
        price:
          type: number
          description: "FIX 44"
        stopPx:
          type: number
          description: "FIX 99"
        expireDate:
          type: integer
          description: "FIX 432 — YYYYMMDD for GTD orders."
        minQty:
          type: number
          description: "FIX 110"
        fee:
          type: number
